###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# Mod list: SHIFT CAPS CTRL/CONTROL ALT MOD2 MOD3 SUPER/WIN-LOGO/MOD4 MOD5.
# MOD5 is AltGr.
$mainMod = SUPER # Sets "Windows" key as main modifier.

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more:
bind = SUPER, H, exec, $keybindMenu # Show this window

# 1. Main section:
bind = SUPER, Q, exec, $prefix $terminal # Terminal
bind = SUPER, C, killactive, # Kill Active Window
bind = SUPER, E, exec, $prefix $fileManager # File Manager
bind = SUPER, F, togglefloating, # Toggle Floating
bind = SUPER SHIFT, F, fullscreen, # Toggle Fullscreen
bind = Super, R, exec, dms ipc call spotlight toggle # App Launcher: Toggle
bind = SUPER, M, exec, $prefix $emoji # Emoji Picker
bind = SUPER, period, layoutmsg, colresize +conf # Bigger Column
bind = SUPER, comma, layoutmsg, colresize -conf # Smaller Column
bind = SUPER, X, layoutmsg, move +col # Next Column
bind = SUPER, Y, layoutmsg, move -col # Previous Column
bind = SUPER SHIFT, P, pin # Toggle Pin
bind = SUPER, Print, exec, $prefix hyprpicker --autocopy # Color Picker
bind = , Print, exec, $prefix $screenshotUtil # Take a Screenshot
bind = SHIFT, Print, exec, $prefix $screenshotUtilEdit # Take and edit a Screenshot
bind = SUPER, V, exec, $prefix $clipboard # Clipboard Manager

# 2. Window movement:
bind = SUPER, W, movewindow, u # Move Up
bind = SUPER, A, movewindow, l # Move Left
bind = SUPER, S, movewindow, d # Move Down
bind = SUPER, D, movewindow, r # Move Right

# 3. Switch to Workspace:
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# 4. Move active window to Workspace:
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# 5. Special Workspace:
bind = SUPER, G, togglespecialworkspace, magic # Toggle Special workspace
bind = SUPER SHIFT, G, movetoworkspace, special:magic # Move active window to it

# 6. Workspace and window Navigation:
bind = SUPER, TAB, workspace, e+1 # Next Workspace
bind = SUPER SHIFT, TAB, workspace, e-1 # Previous Workspace
bind = ALT, TAB, cyclenext # Focus next app on Workspace
bind = ALT SHIFT, TAB, cyclenext, prev # Focus previous app on Workspace

# 7. Window manipulation:
bindm = SUPER, mouse:272, movewindow # Move Window
bindm = SUPER, mouse:273, resizewindow # Resize Window

# 8. Global Shortcuts:
bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$ # Start/Stop recording OBS

# 9. Laptops:
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # Increase Volume
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Decrease Volume
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute Speakers
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Mute Microphone
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ # Increase Brightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- # Decrease Brightness

# 10. Media Control through playerctl:
bindl = , XF86AudioNext, exec, playerctl next # Next
bindl = , XF86AudioPause, exec, playerctl play-pause # Pause
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play
bindl = , XF86AudioPrev, exec, playerctl previous # Previous
